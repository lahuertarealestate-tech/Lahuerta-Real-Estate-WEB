
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <!-- Brand Title & Description -->
    <title>Lahuerta Real Estate | Consultora Inmobiliaria</title>
    <meta name="title" content="Lahuerta Real Estate | Consultora Inmobiliaria" />
    <meta name="description" content="Consultora inmobiliaria liderada por arquitectos. Expertos en compraventa de activos de alto valor, reformas e inversiones en Madrid." />
    <meta name="application-name" content="Lahuerta Real Estate" />
    <meta name="apple-mobile-web-app-title" content="Lahuerta Real Estate" />
    
    <!-- Favicon Configuration (Updated to logofavicon.png) -->
    <link rel="icon" type="image/png" href="/images/logofavicon.png" />
    <link rel="shortcut icon" href="/images/logofavicon.png" />
    <link rel="apple-touch-icon" href="/images/logofavicon.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              // Unificamos todas las fuentes a League Spartan para consistencia total
              sans: ['"League Spartan"', 'sans-serif'],
              serif: ['"League Spartan"', 'sans-serif'],
              italiana: ['"League Spartan"', 'sans-serif'],
              display: ['"League Spartan"', 'sans-serif'],
              spartan: ['"League Spartan"', 'sans-serif'],
            },
            colors: {
              navy: {
                900: '#151520',
                800: '#1c1c2e',
              },
              sand: {
                200: '#E4E4E4',
                400: '#A1A1AA',
                500: '#71717A',
              },
              stone: {
                50: '#f9f9f9',
                100: '#f3f3f3',
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fadeIn 1.2s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            },
            cursor: {
              none: 'none',
            }
          }
        }
      }
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      html.lenis, html.lenis body {
        height: auto;
      }
      
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      /* Prevent iOS Zoom on focus */
      @media screen and (max-width: 768px) {
        input, textarea, select {
          font-size: 16px !important;
        }
      }

      @media (pointer: fine) {
        body {
          cursor: none;
        }
        a, button, input, textarea, select {
          cursor: none;
        }
      }

      ::selection { background-color: #A1A1AA; color: #151520; }
      
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      textarea:-webkit-autofill,
      textarea:-webkit-autofill:hover,
      textarea:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0px 1000px #f3f3f3 inset;
        transition: background-color 5000s ease-in-out 0s;
      }

      .reveal-text-container {
        overflow: hidden;
        display: block;
      }
      .reveal-text-item {
        display: block;
        transform: translateY(100%);
        opacity: 0;
        transform-origin: left top;
      }
    </style>
  <script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "gsap": "https://esm.sh/gsap@^3.14.2",
    "gsap/": "https://esm.sh/gsap@^3.14.2/",
    "lenis": "https://esm.sh/lenis@^1.3.17",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "framer-motion": "https://esm.sh/framer-motion@^12.27.0"
  }
}
</script>
</head>

</html>
